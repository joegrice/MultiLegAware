# =============================================================================
# LOCAL DEVELOPMENT ONLY — docker-compose.dev.yml
#
# Do NOT commit real tokens or keys. Replace all placeholder values below
# before use. This file is intentionally self-contained so you can run the
# service without a .env file.
#
# To run:  docker compose -f docker-compose.dev.yml up --build
# To stop: docker compose -f docker-compose.dev.yml down
# =============================================================================

services:
  journey-service-dev:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8081:8080"
    restart: "no"
    environment:
      - TELEGRAM_BOT_TOKEN=your-token-here
      - TELEGRAM_CHAT_ID=your-chat-id-here
      - TFL_APP_KEY=your-tfl-key-here
      - ORIGIN=SW1A 1AA
      - DESTINATION=EC1N 2TD
      - MORNING_CRON=0 30 7 * * MON-FRI
      - AFTERNOON_CRON=0 30 17 * * MON-FRI
      - PORT=8080
